name: Deploy Signaling Worker
on:
  push:
    branches: [main]
    paths:
      - 'signaling-worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        working-directory: signaling-worker
        run: npm install
      - name: Deploy
        working-directory: signaling-worker
        run: npx wrangler deploy src/index.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
